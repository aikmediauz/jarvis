name: Build JARVIS APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths: [ 'android_app/**', '.github/workflows/build-apk.yml' ]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Restore fixed debug keystore (in-place updates, no uninstall)
        run: |
          mkdir -p ~/.android
          echo "" | base64 -d > ~/.android/debug.keystore
      - name: Scaffold android platform
        working-directory: android_app
        run: flutter create --platforms=android --project-name jarvis .
      - name: Add permissions and intent queries
        working-directory: android_app
        run: |
          MF=android/app/src/main/AndroidManifest.xml
          sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <application#' "$MF"
          sed -i 's#<application#<queries>\n    <intent><action android:name="android.intent.action.VIEW"/><data android:scheme="https"/></intent>\n    <intent><action android:name="android.intent.action.DIAL"/><data android:scheme="tel"/></intent>\n    <intent><action android:name="android.intent.action.SENDTO"/><data android:scheme="smsto"/></intent>\n    <intent><action android:name="android.intent.action.VIEW"/><data android:scheme="sms"/></intent>\n    </queries>\n    <application#' "$MF"
      - name: Get packages
        working-directory: android_app
        run: flutter pub get
      - name: Patch legacy jcenter in plugins
        run: find ~/.pub-cache -name '*.gradle' -exec sed -i 's/jcenter()/mavenCentral()/g' {} + || true
      - name: Fix plugin namespaces (AGP 8)
        run: |
          find ~/.pub-cache -type f -path '*/android/build.gradle' | while read GRADLE; do
            DIR=$(dirname "$GRADLE")
            MANIFEST="$DIR/src/main/AndroidManifest.xml"
            if [ -f "$MANIFEST" ] && ! grep -q "namespace" "$GRADLE"; then
              PKG=$(grep -oP 'package="\K[^"]+' "$MANIFEST" | head -1)
              if [ -n "$PKG" ]; then
                sed -i "0,/android {/s//android {\n    namespace \"$PKG\"/" "$GRADLE"
                sed -i "s/ package=\"$PKG\"//" "$MANIFEST"
              fi
            fi
          done || true
      - name: Build debug APK
        working-directory: android_app
        run: flutter build apk --debug
      - name: Rename APK
        run: cp android_app/build/app/outputs/flutter-apk/app-debug.apk JARVIS.apk
      - uses: actions/upload-artifact@v4
        with:
          name: JARVIS-apk
          path: JARVIS.apk
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: JARVIS - oxirgi versiya
          body: "JARVIS APK. Doimiy imzo - yangilash uchun ochirish shart emas."
          files: JARVIS.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
