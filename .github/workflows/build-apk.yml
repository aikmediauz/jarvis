name: Build JARVIS APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths: [ 'android_app/**', '.github/workflows/build-apk.yml' ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Scaffold android platform
        working-directory: android_app
        run: flutter create --platforms=android --project-name jarvis .
      - name: Add permissions
        working-directory: android_app
        run: |
          MF=android/app/src/main/AndroidManifest.xml
          sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <application#' "$MF"
      - name: Get packages
        working-directory: android_app
        run: flutter pub get
      - name: Patch legacy jcenter in plugins
        run: find ~/.pub-cache -name '*.gradle' -exec sed -i 's/jcenter()/mavenCentral()/g' {} + || true
      - name: Fix plugin namespaces (AGP 8)
        run: |
          find ~/.pub-cache -type f -path '*/android/build.gradle' | while read GRADLE; do
            DIR=$(dirname "$GRADLE")
            MANIFEST="$DIR/src/main/AndroidManifest.xml"
            if [ -f "$MANIFEST" ] && ! grep -q "namespace" "$GRADLE"; then
              PKG=$(grep -oP 'package="\K[^"]+' "$MANIFEST" | head -1)
              if [ -n "$PKG" ]; then
                sed -i "0,/android {/s//android {\n    namespace \"$PKG\"/" "$GRADLE"
                sed -i "s/ package=\"$PKG\"//" "$MANIFEST"
              fi
            fi
          done || true
      - name: Build debug APK
        working-directory: android_app
        run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: JARVIS-apk
          path: android_app/build/app/outputs/flutter-apk/app-debug.apk
